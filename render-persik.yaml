services:
  - type: web
    name: persik
    runtime: python
    plan: free
    region: frankfurt
    rootDir: persik
    buildCommand: pip install -r requirements.txt
    startCommand: python persik_server.py
    healthCheckPath: /
    envVars:
      - key: PERSIK_SERVER
        value: "1"
      - key: AUTO_PRINT_INVOICES
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PERSIK_AUTH_USER
        value: mes
      - key: PERSIK_AUTH_PASSWORD
        sync: false
      - key: GOOGLE_TOKEN_JSON
        sync: false
      - key: GOOGLE_CLIENT_SECRET_JSON
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PIPEDRIVE_TOKEN
        sync: false

services:
  - type: web
    name: persik
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: python persik_server.py
    healthCheckPath: /
    envVars:
      - key: PERSIK_SERVER
        value: "1"
      - key: AUTO_PRINT_INVOICES
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.9"
    disk:
      name: persik-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>פרסיק - מנהל חשבונות</title>
    <!-- Подключаем Tailwind CSS для красивого дизайна -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Подключаем библиотеку Eel для связи с Python -->
    <script type="text/javascript" src="/eel.js"></script>
    
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .modal-animate { animation: fadeIn 0.2s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen bg-[#Eef2f6] flex flex-col items-center pt-8 px-4 font-sans text-slate-800">

    <!-- 1. КОТ БОСС -->
    <div class="relative w-[400px] h-[280px] mx-auto -mb-20 z-20 flex justify-center items-end pointer-events-none drop-shadow-[0_15px_25px_rgba(0,0,0,0.25)]">
        <img src="cat.png" onerror="findCat(this)" class="max-h-full object-contain" alt="Persik Cat" />
    </div>

    <!-- 2. ГЛАВНАЯ ПАНЕЛЬ УПРАВЛЕНИЯ -->
    <div class="relative z-10 bg-white shadow-[0_20px_50px_rgb(0,0,0,0.08)] border border-slate-100 rounded-[35px] p-8 pt-16 w-full max-w-4xl flex flex-col items-center">
        
        <h1 class="text-4xl sm:text-5xl font-extrabold mb-8 tracking-tight flex items-center gap-3">
            <span class="text-[#F39C12]">פרסיק</span>
            <span class="text-[#004B87]">- מנהל חשבונות</span>
        </h1>

        <div class="flex flex-wrap justify-center gap-4 w-full px-4">
            <!-- Кнопка Старт -->
            <button id="btnRun" onclick="uiRunAgent()" class="flex items-center justify-center gap-2 px-6 py-3.5 font-bold rounded-xl transition-all duration-200 shadow-sm border w-full sm:w-auto text-base bg-emerald-500 text-white border-emerald-600 hover:bg-emerald-600 hover:shadow-md hover:-translate-y-0.5">
                <span class="text-xl">🚀</span><span>הפעל עיבוד עכשיו</span>
            </button>
            
            <!-- Кнопка Подготовки к оплате -->
            <button onclick="preparePayment()" class="flex items-center justify-center gap-2 px-6 py-3.5 font-bold rounded-xl transition-all duration-200 shadow-sm border w-full sm:w-auto text-base bg-white text-indigo-600 border-indigo-200 hover:bg-indigo-50 hover:shadow-md hover:-translate-y-0.5">
                <span class="text-xl">💳</span><span>הכנה לתשלום</span>
            </button>
            
            <!-- Кнопка Отчета -->
            <button onclick="openReportModal()" class="flex items-center justify-center gap-2 px-6 py-3.5 font-bold rounded-xl transition-all duration-200 shadow-sm border w-full sm:w-auto text-base bg-white text-blue-600 border-blue-200 hover:bg-blue-50 hover:shadow-md hover:-translate-y-0.5">
                <span class="text-xl">📊</span><span>דוח לקוח</span>
            </button>

            <!-- Кнопка Автоматики -->
            <button id="btnAuto" onclick="uiToggleAuto()" class="flex items-center justify-center gap-2 px-6 py-3.5 font-bold rounded-xl transition-all duration-200 shadow-sm border w-full sm:w-auto text-base border-slate-200 text-slate-700 hover:bg-slate-50 hover:-translate-y-0.5">
                <span class="text-xl">⏰</span><span id="autoText">הפעלה אוטומטית: כבוי</span>
            </button>
            
            <!-- Кнопка Настроек -->
            <button onclick="openSettingsModal()" class="flex items-center justify-center gap-2 px-6 py-3.5 font-bold rounded-xl transition-all duration-200 shadow-sm border w-full sm:w-auto text-base bg-white text-slate-600 border-slate-200 hover:bg-slate-50 hover:shadow-md hover:-translate-y-0.5">
                <span class="text-xl">⚙️</span><span>הגדרות ספקים</span>
            </button>
        </div>
    </div>

    <!-- 3. ОКНО ЛОГОВ (ЖУРНАЛ) -->
    <div class="relative z-10 mt-8 w-full max-w-5xl">
        <div class="flex justify-between items-center mb-3 px-2">
            <h2 class="text-slate-700 font-bold flex items-center gap-2 text-lg">
                <span class="w-2.5 h-2.5 rounded-full bg-blue-500 animate-pulse shadow-[0_0_8px_rgba(59,130,246,0.6)]"></span>
                יומן פעילות
            </h2>
            <div class="flex gap-2">
                <button onclick="copyLogs()" class="text-sm font-semibold text-slate-500 hover:text-slate-800 transition-colors flex items-center gap-1 bg-white hover:bg-slate-50 px-4 py-2 rounded-xl shadow-sm border border-slate-200">
                    <span>העתק יומן</span>
                </button>
                <button onclick="clearLogs()" class="text-sm font-semibold text-slate-500 hover:text-slate-800 transition-colors flex items-center gap-1 bg-white hover:bg-slate-50 px-4 py-2 rounded-xl shadow-sm border border-slate-200">
                    <span>נקה מסך</span>
                </button>
            </div>
        </div>
        
        <div id="logArea" class="bg-white border border-slate-200 shadow-[0_10px_30px_rgb(0,0,0,0.03)] rounded-[25px] h-[350px] w-full p-6 overflow-y-auto font-mono text-[15px] leading-relaxed">
        </div>
    </div>

    <!-- МОДАЛКА: ОТЧЕТ -->
    <div id="reportModal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex justify-center items-center">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md mx-4 modal-animate border border-slate-100">
            <h2 class="text-2xl font-bold mb-6 text-slate-800">הפקת דוח לקוח (P&L)</h2>
            <input type="text" id="clientNameInput" placeholder="הכנס שם לקוח מדוייק..." class="w-full p-4 border border-slate-300 rounded-xl mb-6 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-lg">
            <div class="flex justify-end gap-3">
                <button onclick="closeModals()" class="px-5 py-2.5 rounded-xl font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 transition-colors">ביטול</button>
                <button onclick="submitReport()" class="px-5 py-2.5 rounded-xl font-bold text-white bg-blue-600 hover:bg-blue-700 transition-colors shadow-sm">הפק דוח</button>
            </div>
        </div>
    </div>

    <!-- МОДАЛКА: ПОСТАВЩИКИ -->
    <div id="settingsModal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex justify-center items-center">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-2xl mx-4 modal-animate border border-slate-100 flex flex-col max-h-[90vh]">
            <h2 class="text-2xl font-bold mb-6 text-slate-800 flex justify-between items-center">
                ניהול ספקים ומיילים
                <button onclick="closeModals()" class="text-slate-400 hover:text-slate-700 text-2xl leading-none">&times;</button>
            </h2>
            
            <div id="addFormContainer" class="flex gap-3 mb-6 bg-slate-50 p-4 rounded-2xl border border-slate-100 transition-all duration-300">
                <input type="text" id="supName" placeholder="שם ספק..." class="w-1/3 p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                <input type="text" id="supEmail" placeholder="כתובות אימייל (מופרדות בפסיק)..." class="w-2/3 p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-left" dir="ltr">
                <button id="saveSupBtn" onclick="saveSupplier()" class="px-6 rounded-xl font-bold text-white bg-blue-600 hover:bg-blue-700 transition-colors shadow-sm text-xl flex items-center justify-center min-w-[60px]">+</button>
            </div>
            
            <div class="overflow-y-auto flex-grow pr-2 border-t border-slate-100 pt-4" id="suppliersList">
            </div>
        </div>
    </div>

    <script>
        function findCat(img) {
            const attempts = ['cat.png.png', 'cat.png.jpg', 'cat.jpg', 'cat.jpeg'];
            let current = parseInt(img.getAttribute('data-attempt') || '0');
            if (current < attempts.length) {
                img.src = attempts[current];
                img.setAttribute('data-attempt', current + 1);
            } else {
                img.style.display = 'none';
            }
        }

        if (typeof eel !== 'undefined') {
            eel.expose(addLog);
            eel.expose(uiSetLoading);
            eel.expose(agentFinished);
        }

        window.addEventListener('load', function() {
            addLog("מערכת פרסיק אותחלה בהצלחה");
            addLog("הבוס הראשי בתצפית... ממתין לפקודות");
        });

        function addLog(msg) {
            const time = new Date().toLocaleTimeString('he-IL', {hour12: false});
            const logArea = document.getElementById('logArea');
            const logEntry = document.createElement('div');
            
            logEntry.className = "mb-2 text-slate-600 hover:bg-slate-50/80 px-4 py-2.5 rounded-xl transition-colors border-r-4 border-transparent hover:border-blue-400 flex items-start gap-2";
            logEntry.innerHTML = `
                <span class="text-slate-400 font-bold select-none shrink-0">&lt;</span> 
                <span class="flex-grow">${msg}</span>
                <span class="text-xs text-slate-400 shrink-0 mt-1">[${time}]</span>
            `;
            
            logArea.appendChild(logEntry);
            logArea.scrollTop = logArea.scrollHeight;
        }

        function clearLogs() {
            document.getElementById('logArea').innerHTML = '';
            addLog("המסך נוקה.");
        }

        function copyLogs() {
            const logArea = document.getElementById('logArea');
            if (!logArea || !logArea.innerText.trim()) return;
            
            let logsArray = [];
            const rows = logArea.children;
            for (let i = 0; i < rows.length; i++) {
                let text = rows[i].innerText.replace(/[\n\r]+/g, ' ').trim();
                if (text) logsArray.push(text);
            }
            const textToCopy = logsArray.join('\n');

            const btnSpan = document.querySelector('button[onclick="copyLogs()"] span');
            const originalText = btnSpan.innerText;

            navigator.clipboard.writeText(textToCopy).then(() => {
                btnSpan.innerText = "הועתק! ✔️";
                setTimeout(() => btnSpan.innerText = originalText, 2000);
            }).catch(err => {
                const textArea = document.createElement("textarea");
                textArea.value = textToCopy;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    btnSpan.innerText = "הועתק! ✔️";
                    setTimeout(() => btnSpan.innerText = originalText, 2000);
                } catch (ex) {}
                document.body.removeChild(textArea);
            });
        }

        function uiRunAgent() {
            uiSetLoading();
            eel.run_agent()();
        }

        // НОВАЯ ФУНКЦИЯ ДЛЯ КНОПКИ ОПЛАТЫ
        async function preparePayment() {
            uiSetLoading();
            addLog("מתחיל לחשב חשבוניות פתוחות ולהכין דוח תשלומים...");
            try {
                const result = await eel.prepare_payment_report()();
                addLog(result);
            } catch(e) {
                addLog("שגיאה בתקשורת עם השרת. ודא שהפונקציה קיימת בקוד הפייתון.");
            }
            agentFinished();
        }

        // === ВОССТАНОВЛЕННАЯ ФУНКЦИЯ ДЛЯ АВТОМАТИКИ ===
        let autoRunEnabled = false;
        async function uiToggleAuto() {
            autoRunEnabled = await eel.toggle_auto_run()();
            const btn = document.getElementById('btnAuto');
            const text = document.getElementById('autoText');
            
            if(autoRunEnabled) {
                btn.classList.remove('border-slate-200', 'text-slate-700', 'hover:bg-slate-50');
                btn.classList.add('bg-purple-100', 'border-purple-300', 'text-purple-700', 'shadow-inner');
                text.innerText = 'הפעלה אוטומטית: פעיל';
            } else {
                btn.classList.add('border-slate-200', 'text-slate-700', 'hover:bg-slate-50');
                btn.classList.remove('bg-purple-100', 'border-purple-300', 'text-purple-700', 'shadow-inner');
                text.innerText = 'הפעלה אוטומטית: כבוי';
            }
        }

        function uiSetLoading() {
            const btn = document.getElementById('btnRun');
            if(btn) {
                btn.classList.add('opacity-50', 'pointer-events-none');
                btn.innerHTML = '<span class="text-xl animate-spin">⏳</span><span>מעבד נתונים...</span>';
            }
        }

        function agentFinished() {
            const btn = document.getElementById('btnRun');
            if(btn) {
                btn.classList.remove('opacity-50', 'pointer-events-none');
                btn.innerHTML = '<span class="text-xl">🚀</span><span>הפעל עיבוד עכשיו</span>';
            }
        }

        function closeModals() {
            document.getElementById('reportModal').classList.add('hidden');
            document.getElementById('settingsModal').classList.add('hidden');
        }

        function openReportModal() {
            document.getElementById('reportModal').classList.remove('hidden');
            document.getElementById('clientNameInput').focus();
        }

        function submitReport() {
            const name = document.getElementById('clientNameInput').value.trim();
            if (name) {
                closeModals();
                uiSetLoading();
                eel.generate_report(name)();
            }
        }

        async function openSettingsModal() {
            document.getElementById('settingsModal').classList.remove('hidden');
            refreshSuppliers();
        }

        async function refreshSuppliers() {
            const rawData = await eel.get_suppliers()();
            const data = JSON.parse(rawData);
            const list = document.getElementById('suppliersList');
            list.innerHTML = '';
            
            for (const [name, info] of Object.entries(data)) {
                const emailsStr = Array.isArray(info.emails) ? info.emails.join(", ") : info.emails;
                const safeName = name.replace(/'/g, "\\'");
                const safeEmails = emailsStr.replace(/'/g, "\\'");

                list.innerHTML += `
                    <div class="flex justify-between items-center bg-white p-4 mb-3 rounded-xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
                        <div class="flex-grow">
                            <h3 class="font-bold text-lg text-slate-800">${name}</h3>
                            <p class="text-sm text-slate-500 font-mono mt-1" dir="ltr">${emailsStr}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editSupplier('${safeName}', '${safeEmails}')" class="text-blue-400 hover:text-blue-600 p-2 hover:bg-blue-50 rounded-lg transition-colors" title="ערוך">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                            </button>
                            <button onclick="deleteSupplier('${safeName}')" class="text-red-400 hover:text-red-600 p-2 hover:bg-red-50 rounded-lg transition-colors" title="מחק">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </div>
                `;
            }
        }

        function editSupplier(name, emails) {
            document.getElementById('supName').value = name;
            document.getElementById('supEmail').value = emails;
            
            const btn = document.getElementById('saveSupBtn');
            btn.innerHTML = '✓';
            btn.classList.replace('bg-blue-600', 'bg-emerald-500');
            btn.classList.replace('hover:bg-blue-700', 'hover:bg-emerald-600');
            
            const form = document.getElementById('addFormContainer');
            form.classList.add('ring-2', 'ring-emerald-400', 'bg-emerald-50');
            
            document.getElementById('supEmail').focus();
        }

        async function saveSupplier() {
            const name = document.getElementById('supName').value.trim();
            const emails = document.getElementById('supEmail').value.trim();
            if (name && emails) {
                await eel.save_supplier(name, emails)();
                
                document.getElementById('supName').value = '';
                document.getElementById('supEmail').value = '';
                
                const btn = document.getElementById('saveSupBtn');
                btn.innerHTML = '+';
                btn.classList.replace('bg-emerald-500', 'bg-blue-600');
                btn.classList.replace('hover:bg-emerald-600', 'hover:bg-blue-700');
                
                const form = document.getElementById('addFormContainer');
                form.classList.remove('ring-2', 'ring-emerald-400', 'bg-emerald-50');
                
                refreshSuppliers();
            }
        }

        async function deleteSupplier(name) {
            if (confirm(`האם אתה בטוח שברצונך למחוק את הספק '${name}'?`)) {
                await eel.delete_supplier(name)();
                refreshSuppliers();
            }
        }
    </script>
</body>
</html>
